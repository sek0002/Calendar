<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1b27cb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MUUC events" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>MUUC events</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" href="assets/muuc-default.png" />
    <link rel="apple-touch-icon" href="assets/muuc-default.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="site-logo" href="https://muuc.org.au" target="_blank" rel="noopener">
        <img src="assets/muuc-default.png" alt="MUUC" />
      </a>
      <div class="controls">
        <button type="button" id="todayButton" title="Jump to the current month">Today</button>
        <button type="button" id="prevButton" title="Previous month" aria-label="Previous month">‹</button>
        <div class="month-jump">
          <button type="button" id="monthLabel" class="month-label" aria-expanded="false" title="Choose month and year"></button>
          <div id="monthJumpPanel" class="month-jump-panel" hidden>
            <select id="jumpMonthSelect" aria-label="Choose month"></select>
            <select id="jumpYearSelect" aria-label="Choose year"></select>
          </div>
        </div>
        <button type="button" id="nextButton" title="Next month" aria-label="Next month">›</button>
        <button type="button" id="themeToggle" class="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode" aria-pressed="false">☾</button>
      </div>
    </header>

    <section class="hero-banner" aria-label="Upcoming events showcase">
      <div class="hero-media active" id="heroMedia" aria-hidden="true"></div>
      <div class="hero-media" id="heroMediaNext" aria-hidden="true"></div>
      <div class="hero-content">
        <p id="heroEyebrow" class="eyebrow">Upcoming</p>
        <h2 id="heroTitle">Loading events…</h2>
        <p id="heroDate" class="hero-date"></p>
        <p id="heroDescription" class="hero-description"></p>
        <div class="hero-actions">
          <button type="button" id="heroButton" class="hero-button">View event</button>
          <div class="hero-action-links">
            <a id="heroGoogleCalendarLink" class="hero-action-link" href="#" target="_blank" rel="noopener">Google</a>
            <a id="heroMicrosoftCalendarLink" class="hero-action-link" href="#" target="_blank" rel="noopener">Microsoft</a>
            <a id="heroAppleCalendarLink" class="hero-action-link" href="#" download="muuc-event.ics">Apple</a>
          </div>
        </div>
      </div>
      <div class="hero-progress" aria-hidden="true">
        <div class="hero-progress-track">
          <span id="heroProgressFill"></span>
        </div>
        <div id="heroProgressDots" class="hero-progress-dots"></div>
      </div>
      <div id="heroUpcoming" class="hero-upcoming" aria-label="More upcoming events"></div>
    </section>

    <main class="layout">
      <section class="calendar-panel" aria-label="Calendar">
        <div class="weekday-grid" aria-hidden="true">
          <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>

      <aside class="details-panel" aria-label="Event details">
        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="Search events" />
          <select id="monthSelect" aria-label="Filter month">
            <option value="">All months</option>
          </select>
          <div class="sort-toggle" aria-label="Sort events">
            <button type="button" id="sortDateButton" class="active" aria-pressed="true">Date</button>
            <button type="button" id="sortNameButton" aria-pressed="false">Name</button>
          </div>
        </div>
        <div id="status" class="status">Loading calendar data…</div>
        <div id="eventList" class="event-list"></div>
      </aside>
    </main>

    <dialog id="eventDialog">
      <button id="closeDialog" class="icon-button" type="button" aria-label="Close">×</button>
      <img id="dialogImage" alt="" />
      <p id="dialogDate" class="eyebrow"></p>
      <h2 id="dialogTitle"></h2>
      <div class="dialog-actions">
        <a id="dialogTeamappLink" class="dialog-action-link" href="#" target="_blank" rel="noopener">Open event</a>
        <a id="dialogGoogleCalendarLink" class="dialog-action-link" href="#" target="_blank" rel="noopener">Google</a>
        <a id="dialogMicrosoftCalendarLink" class="dialog-action-link" href="#" target="_blank" rel="noopener">Microsoft</a>
        <a id="dialogAppleCalendarLink" class="dialog-action-link" href="#" download="muuc-event.ics">Apple</a>
      </div>
      <div id="dialogDescription" class="structured-description"></div>
    </dialog>

    <div id="hoverCard" class="hover-card" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
